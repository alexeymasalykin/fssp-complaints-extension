<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Результаты заполнения — ФССП Жалобы</title>
  <link rel="stylesheet" href="result.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header__left">
      <svg class="header__logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
      </svg>
      <div>
        <h1 class="header__title">Результаты заполнения обращений</h1>
        <p class="header__subtitle" id="check-date"></p>
      </div>
    </div>
    <div class="header__brand">ФССП Жалобы</div>
  </header>

  <!-- Summary cards -->
  <section class="summary" id="summary">
    <div class="summary-card summary-card--total">
      <div class="summary-card__icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
      </div>
      <div class="summary-card__data">
        <span class="summary-card__value" id="stat-total">0</span>
        <span class="summary-card__label">Всего обращений</span>
      </div>
    </div>

    <div class="summary-card summary-card--ok">
      <div class="summary-card__icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 6 9 17l-5-5"/>
        </svg>
      </div>
      <div class="summary-card__data">
        <span class="summary-card__value" id="stat-submitted">0</span>
        <span class="summary-card__label">Отправлено</span>
      </div>
    </div>

    <div class="summary-card summary-card--found">
      <div class="summary-card__icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
      </div>
      <div class="summary-card__data">
        <span class="summary-card__value" id="stat-filled">0</span>
        <span class="summary-card__label">Заполнено</span>
      </div>
    </div>

    <div class="summary-card summary-card--error">
      <div class="summary-card__icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <path d="m15 9-6 6"/>
          <path d="m9 9 6 6"/>
        </svg>
      </div>
      <div class="summary-card__data">
        <span class="summary-card__value" id="stat-error">0</span>
        <span class="summary-card__label">Ошибки</span>
      </div>
    </div>
  </section>

  <!-- Toolbar -->
  <section class="toolbar">
    <div class="toolbar__left">
      <div class="search-box">
        <svg class="search-box__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.3-4.3"/>
        </svg>
        <input type="text" class="search-box__input" id="search-input" placeholder="Поиск по организации или тексту...">
      </div>

      <div class="filter-tabs" id="filter-tabs">
        <button class="filter-tab active" data-filter="all">Все <span class="filter-tab__count" id="count-all">0</span></button>
        <button class="filter-tab" data-filter="submitted">Отправлено <span class="filter-tab__count" id="count-submitted">0</span></button>
        <button class="filter-tab" data-filter="filled">Заполнено <span class="filter-tab__count" id="count-filled">0</span></button>
        <button class="filter-tab" data-filter="error">Ошибка <span class="filter-tab__count" id="count-error">0</span></button>
      </div>
    </div>

    <div class="toolbar__actions">
      <button class="btn btn--outline-danger" id="btn-clear">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 6h18"/>
          <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/>
          <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
        </svg>
        Очистить список
      </button>
    </div>
  </section>

  <!-- Data table -->
  <section class="table-section">
    <div class="table-wrapper">
      <table class="data-table" id="data-table">
        <thead>
          <tr>
            <th class="col-num" data-sort="index">№</th>
            <th class="col-org sortable" data-sort="orgName">Организация</th>
            <th class="col-territory sortable" data-sort="territorialBody">Терр. орган</th>
            <th class="col-text">Текст обращения</th>
            <th class="col-status sortable" data-sort="status">Статус</th>
          </tr>
        </thead>
        <tbody id="table-body">
        </tbody>
      </table>
    </div>
  </section>

  <!-- Empty state -->
  <div class="empty-state hidden" id="empty-state">
    <svg class="empty-state__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
      <line x1="16" y1="13" x2="8" y2="13"/>
      <line x1="16" y1="17" x2="8" y2="17"/>
    </svg>
    <h2 class="empty-state__title">Нет результатов</h2>
    <p class="empty-state__text">Загрузите файл с данными и начните заполнение через расширение</p>
  </div>

  <script type="module" src="result.ts"></script>
</body>
</html>
